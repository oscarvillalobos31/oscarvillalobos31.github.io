  <!-- Brownie -->
  <rect x="22" y="52" width="76" height="30" rx="6" fill="#7B3F00"/>
  <rect x="26" y="55" width="70" height="24" rx="4" fill="#9B5A2A"/>
  <!-- Texture lines -->
  <line x1="35" y1="58" x2="35" y2="76" stroke="#7B3F00" stroke-width="1" opacity="0.4"/>
  <line x1="55" y1="58" x2="55" y2="76" stroke="#7B3F00" stroke-width="1" opacity="0.4"/>
  <line x1="75" y1="58" x2="75" y2="76" stroke="#7B3F00" stroke-width="1" opacity="0.4"/>
  <!-- Ice cream on top -->
  <ellipse cx="60" cy="52" rx="22" ry="9" fill="#FFF7F0"/>
